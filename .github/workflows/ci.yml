name: Java CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    # The @SpringBootTest context connects to MongoDB at startup (index creation),
    # so provide a MongoDB service for the tests to run against.
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      MONGO_URI: mongodb://localhost:27017/movie-api-db
      APP_CATALOG_SEED_ON_STARTUP: "false"
      APP_CACHE_REDIS_ENABLED: "false"
      APP_MESSAGING_RABBITMQ_ENABLED: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run tests
        run: ./mvnw test
