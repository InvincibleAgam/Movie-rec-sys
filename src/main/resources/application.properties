spring.config.import=optional:file:.env[.properties]
spring.application.name=Movie
spring.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/${MONGO_DATABASE:movie-api-db}}
spring.mongodb.database=${MONGO_DATABASE:movie-api-db}

app.catalog.seed-on-startup=${APP_CATALOG_SEED_ON_STARTUP:true}
app.recommendations.snapshot-size=${APP_RECOMMENDATIONS_SNAPSHOT_SIZE:24}
app.recommendations.projector.enabled=${APP_RECOMMENDATIONS_PROJECTOR_ENABLED:true}
app.recommendations.projector.fixed-delay-ms=${APP_RECOMMENDATIONS_PROJECTOR_DELAY_MS:5000}
app.recommendations.projector.batch-size=${APP_RECOMMENDATIONS_PROJECTOR_BATCH_SIZE:100}
