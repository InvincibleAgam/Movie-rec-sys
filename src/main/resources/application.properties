spring.config.import=optional:file:.env[.properties]
spring.application.name=Movie
server.port=${PORT:8080}
spring.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/${MONGO_DATABASE:movie-api-db}}
spring.mongodb.database=${MONGO_DATABASE:movie-api-db}
spring.data.redis.repositories.enabled=false

# --- Catalog ---
app.catalog.seed-on-startup=${APP_CATALOG_SEED_ON_STARTUP:true}

# --- Recommendation Engine ---
app.recommendations.snapshot-size=${APP_RECOMMENDATIONS_SNAPSHOT_SIZE:24}
app.recommendations.projector.enabled=${APP_RECOMMENDATIONS_PROJECTOR_ENABLED:true}
app.recommendations.projector.fixed-delay-ms=${APP_RECOMMENDATIONS_PROJECTOR_DELAY_MS:5000}
app.recommendations.projector.batch-size=${APP_RECOMMENDATIONS_PROJECTOR_BATCH_SIZE:100}

# --- Collaborative Filtering ---
app.collaborative.max-neighbors=${APP_COLLABORATIVE_MAX_NEIGHBORS:30}
app.collaborative.enabled=${APP_COLLABORATIVE_ENABLED:true}
app.collaborative.rebuild-delay-ms=${APP_COLLABORATIVE_REBUILD_DELAY_MS:1800000}

# --- Cache ---
app.cache.redis-enabled=${APP_CACHE_REDIS_ENABLED:false}
app.cache.recommendations.movie-ttl-seconds=${APP_CACHE_MOVIE_TTL_SECONDS:900}
app.cache.recommendations.personalized-ttl-seconds=${APP_CACHE_PERSONALIZED_TTL_SECONDS:180}
app.cache.recommendations.profile-ttl-seconds=${APP_CACHE_PROFILE_TTL_SECONDS:180}

# --- Messaging (RabbitMQ) ---
app.messaging.rabbitmq.enabled=${APP_MESSAGING_RABBITMQ_ENABLED:false}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# --- Auth (JWT) ---
app.auth.jwt.secret=${APP_AUTH_JWT_SECRET:default-super-secret-key-that-should-be-changed-in-production-at-least-256-bits}
app.auth.jwt.access-token-validity-minutes=${APP_AUTH_ACCESS_TOKEN_VALIDITY_MINUTES:15}
app.auth.jwt.refresh-token-validity-days=${APP_AUTH_REFRESH_TOKEN_VALIDITY_DAYS:7}

# --- Observability ---
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.recommendations.movie.duration=0.5,0.95,0.99
management.metrics.distribution.percentiles.recommendations.personalized.duration=0.5,0.95,0.99

# --- Resilience4j ---
resilience4j.circuitbreaker.instances.redisCache.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.redisCache.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.redisCache.sliding-window-size=10
resilience4j.circuitbreaker.instances.redisCache.minimum-number-of-calls=5
resilience4j.retry.instances.redisRetry.max-attempts=3
resilience4j.retry.instances.redisRetry.wait-duration=500ms
